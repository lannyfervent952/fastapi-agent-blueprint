# ВІцьќЅ ВѕюВёю: ВъљвЈЎ ВѕўВаЋ Рєњ В▓┤ьЂгвДї
# stagesвАю вХёвдг: commit(ВъљвЈЎВѕўВаЋ), manual(ВѕўвЈЎ В▓┤ьЂг)
repos:
  # ==================== STAGE: COMMIT (ВъљвЈЎ ВІцьќЅ) ====================
  # 1. ЖИ░в│И ьїїВЮ╝ Ж▓ђВдЮ в░Ј ВъљвЈЎ ВѕўВаЋ
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^migrations/
        types: [python]
      - id: end-of-file-fixer
        exclude: ^migrations/
        types: [python]
      - id: check-yaml
        args: ["--unsafe"]  # allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements
        exclude: ^migrations/
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # 2. Python ЖхгвгИ ьўёвїђьЎћ (ВъљвЈЎ ВѕўВаЋ)
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: ["--py312-plus"]
        exclude: ^migrations/

  # 3. в»ИВѓгВџЕ import/в│ђВѕў ВаюЖ▒░ (ВъљвЈЎ ВѕўВаЋ)
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        exclude: ^migrations/
        args:
          - --in-place
          - --remove-unused-variables
          - --remove-all-unused-imports
          - --expand-star-imports
          - --remove-duplicate-keys

  # 4. Import ВаЋваг (ВъљвЈЎ ВѕўВаЋ)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        exclude: ^migrations/
        args: ["--profile", "black", "--filter-files"]

  # 5. ВйћвЊю ьЈгвДиьїЁ (ВъљвЈЎ ВѕўВаЋ)
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        exclude: ^migrations/
        language_version: python3.12

  # 6. вд░ьїЁ (В▓┤ьЂгвДї, ВЎёьЎћ)
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        exclude: ^migrations/
        args:
          - --ignore=F841,E501,W503,E203,E402,F401,B008,B006,C901,SIM114,SIM910,SIM904
          - --max-line-length=88
          - --max-complexity=20
          - --per-file-ignores=**/routers/*:B008,**/workflows/*:B006
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions

  # ==================== STAGE: MANUAL (ВѕўвЈЎ ВІцьќЅ) ====================
  # ьЃђВъЁ В▓┤ьѓ╣: pre-commit run --hook-stage manual mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        stages: [manual]
        exclude: ^(migrations/|tests/|.*test\.py$|run_.*\.py$|force_.*\.py$)
        args:
          - --ignore-missing-imports
          - --check-untyped-defs  # disallowВЌљВёю ВЎёьЎћ
          - --warn-redundant-casts
          - --no-implicit-optional
        additional_dependencies:
          - types-requests
          - pydantic

  # в│┤ВЋѕ В▓┤ьЂг: pre-commit run --hook-stage manual bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        stages: [manual]
        exclude: ^(migrations/|tests/|.*_test\.py$)
        args:
          - -ll  # Low/Low severityвДї
          - --skip=B113,B314,B413  # ВЋївацВДё ВЮ┤Віѕ вг┤ВІю (timeout, xml, pycrypto)
