# Execution order: auto-fix → check-only
# Separated by stages: commit (auto-fix), manual (manual check)
repos:
  # ==================== STAGE: COMMIT (auto-run) ====================
  # 1. Basic file validation and auto-fix
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^migrations/
        types: [python]
      - id: end-of-file-fixer
        exclude: ^migrations/
        types: [python]
      - id: check-yaml
        args: ["--unsafe"]  # allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements
        exclude: ^migrations/
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # 2. Ruff: linting + formatting (integrates pyupgrade, autoflake, isort, Black, flake8, bandit)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # Ruff linter (check + fix): replaces flake8, pyupgrade, autoflake, isort, bandit
      - id: ruff-check
        args: [--fix]
        exclude: ^migrations/
      # Ruff formatter: replaces Black
      - id: ruff-format
        exclude: ^migrations/

  # ==================== STAGE: MANUAL (manual run) ====================
  # Type checking: pre-commit run --hook-stage manual mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        stages: [manual]
        exclude: ^(migrations/|tests/|.*test\.py$|run_.*\.py$|force_.*\.py$)
        args:
          - --ignore-missing-imports
          - --check-untyped-defs  # relaxed from disallow
          - --warn-redundant-casts
          - --no-implicit-optional
        additional_dependencies:
          - types-requests
          - pydantic

  # ==================== STAGE: COMMIT (architecture violation checks) ====================
  - repo: local
    hooks:
      # Prohibit Domain layer from importing Infrastructure
      - id: no-domain-infra-import
        name: "Prohibit Domain → Infrastructure import"
        language: pygrep
        entry: "from src\\..*\\.infrastructure"
        files: "src/.*/domain/.*\\.py$"

      # Detect residual Entity pattern (ADR 004: unified to DTO)
      - id: no-entity-pattern
        name: "Entity pattern not allowed (unified to DTO)"
        language: pygrep
        entry: "\\.to_entity\\(|\\.from_entity\\(|from src\\._core\\.domain\\.entities"
        files: "\\.py$"

  # ==================== STAGE: COMMIT-MSG (commit message validation) ====================
  # Conventional Commits: type: description OR type(scope): description
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, chore, test, ci, perf, style, i18n]

